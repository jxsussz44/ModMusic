<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MOD MUSIC</title>

<style>
/* =========================
   🎨 CAPA UI (ESTILOS)
========================= */

:root{
--primary:#ef4444;
--dark:#0f172a;
--card:#1e293b;
}

body{
margin:0;
background:var(--dark);
color:white;
font-family:sans-serif;
}

/* HEADER */
header{
display:flex;
gap:10px;
padding:15px;
background:#020617;
}

input{
flex:1;
padding:10px;
border-radius:8px;
border:none;
}

/* GRID RESPONSIVE */
.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:15px;
padding:20px;
}

/* CARD COMPONENT */
.card{
background:var(--card);
border-radius:12px;
padding:10px;
transition:.3s;
animation:fadeIn .5s;
}

.card:hover{
transform:translateY(-5px) scale(1.03);
box-shadow:0 10px 20px rgba(0,0,0,.5);
}

.card img{
width:100%;
height:150px;
object-fit:cover;
border-radius:10px;
}

/* BUTTON COMPONENT */
.btn{
background:var(--primary);
border:none;
padding:10px;
border-radius:8px;
color:white;
cursor:pointer;
transition:.3s;
}

.btn:hover{
transform:scale(1.05);
background:#dc2626;
}

/* CARRITO */
.cart{
position:fixed;
right:-350px;
top:0;
width:320px;
height:100%;
background:#020617;
transition:.4s;
padding:15px;
overflow:auto;
}

.cart.active{right:0;}

.cart-item{
background:#1e293b;
padding:10px;
margin-bottom:10px;
border-radius:8px;
}

/* ANIMACIONES */
@keyframes fadeIn{
from{opacity:0; transform:translateY(20px);}
to{opacity:1; transform:translateY(0);}
}

/* RESPONSIVE */
@media(max-width:600px){
header{flex-direction:column;}
}
</style>
</head>

<body>

<!-- =========================
     🧩 CAPA UI
========================= -->

<header>
<h2>🎧 MOD MUSIC</h2>
<input id="search" placeholder="Buscar...">
<button class="btn" onclick="Controller.toggleCart()">🛒</button>
</header>

<section class="products" id="products"></section>

<div class="cart" id="cart">
<h2>Carrito</h2>
<div id="cartItems"></div>
<h3 id="total"></h3>
</div>

<script>
/* =========================
   ⚙️ CAPA MOTOR (LOGICA)
========================= */

const Model = {
products:[
{name:"Guitarra",price:500,img:"https://images.unsplash.com/photo-1510915228340-29c85a43dcfe?w=400"},
{name:"Piano",price:900,img:"https://images.unsplash.com/photo-1513885535751-8b9238bd345a?w=400"},
{name:"Batería",price:700,img:"https://images.unsplash.com/photo-1511379938547-c1f69419868d?w=400"},
{name:"Violín",price:400,img:"https://images.unsplash.com/photo-1520523839897-bd0b52f945a0?w=400"},
{name:"Saxofón",price:650,img:"https://images.unsplash.com/photo-1507838153414-b4b713384a76?w=400"}
],
cart:[]
};

/* =========================
   🎨 CAPA VIEW
========================= */

const View = {
renderProducts(list){
const container=document.getElementById("products");
container.innerHTML="";

list.forEach((p,i)=>{
container.innerHTML+=`
<div class="card">
<img src="${p.img}" loading="lazy">
<h3>${p.name}</h3>
<p>$${p.price}</p>
<button class="btn" onclick="Controller.add(${i})">Agregar</button>
</div>`;
});
},

renderCart(){
const c=document.getElementById("cartItems");
c.innerHTML="";
let total=0;

Model.cart.forEach((p,i)=>{
total+=p.price*p.qty;

c.innerHTML+=`
<div class="cart-item">
${p.name} x ${p.qty}
<button onclick="Controller.change(${i},-1)">-</button>
<button onclick="Controller.change(${i},1)">+</button>
</div>`;
});

document.getElementById("total").innerText="Total: $"+total;
}
};

/* =========================
   🎮 CONTROLADOR
========================= */

const Controller = {
init(){
View.renderProducts(Model.products);

search.oninput=e=>{
const t=e.target.value.toLowerCase();
View.renderProducts(Model.products.filter(p=>p.name.toLowerCase().includes(t)));
};
},

add(i){
let item=Model.cart.find(p=>p.name===Model.products[i].name);

if(item){item.qty++}
else{Model.cart.push({...Model.products[i],qty:1})}

View.renderCart();
},

change(i,v){
Model.cart[i].qty+=v;
if(Model.cart[i].qty<=0) Model.cart.splice(i,1);
View.renderCart();
},

toggleCart(){
document.getElementById("cart").classList.toggle("active");
}
};

Controller.init();
</script>

</body>
<div class="filters">
<button onclick="Controller.filter('all')">Todos</button>
<button onclick="Controller.filter('cuerda')">Cuerda</button>
<button onclick="Controller.filter('viento')">Viento</button>
</div>
<div id="notif" style="
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:#22c55e;
padding:10px 20px;
border-radius:10px;
display:none;">
Añadido al carrito ✅
</div>
</html>
