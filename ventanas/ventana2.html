<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MOD MUSIC</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif;}

body{
    color:white;
    background: linear-gradient(270deg,#0a0f1c,#111827,#1e3a8a,#020617);
    background-size:800% 800%;
    animation:fondo 12s ease infinite;
}

/* 🔥 Fondo animado */
@keyframes fondo{
0%{background-position:0%}
50%{background-position:100%}
100%{background-position:0%}
}

/* 🎬 INTRO TIPO NETFLIX */
.intro{
    position:fixed;
    width:100%;
    height:100%;
    background:black;
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:100;
    animation:fadeOut 2.5s forwards 2s;
}

.logo-intro{
    font-size:40px;
    color:#3b82f6;
    animation:zoom 2s;
}

@keyframes zoom{
    0%{transform:scale(0.5);opacity:0;}
    100%{transform:scale(1.2);opacity:1;}
}

@keyframes fadeOut{
    to{opacity:0;visibility:hidden;}
}

/* HEADER */
header{
display:flex;
justify-content:space-between;
padding:20px;
background:rgba(0,0,0,0.6);
backdrop-filter:blur(10px);
}

.cart-btn{
cursor:pointer;
font-size:22px;
position:relative;
}

.cart-count{
position:absolute;
top:-8px;
right:-10px;
background:red;
border-radius:50%;
padding:4px 8px;
font-size:12px;
}

/* PRODUCTOS */
.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
padding:30px;
}

.card{
background:rgba(17,24,39,0.8);
border-radius:15px;
padding:15px;
transition:0.4s;
}

.card:hover{
transform:scale(1.05);
box-shadow:0 0 25px rgba(59,130,246,0.7);
}

.card img{
width:100%;
height:150px;
object-fit:cover;
border-radius:10px;
}

/* BOTON */
button{
margin-top:10px;
width:100%;
padding:10px;
border:none;
border-radius:10px;
background:#3b82f6;
color:white;
cursor:pointer;
}

/* OVERLAY */
.overlay{
position:fixed;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
opacity:0;
pointer-events:none;
transition:0.5s;
}

.overlay.active{
opacity:1;
pointer-events:all;
}

/* CARRITO */
.cart{
position:fixed;
right:-400px;
top:0;
width:350px;
height:100%;
background:rgba(2,6,23,0.95);
backdrop-filter:blur(15px);
padding:20px;
transition:0.5s;
z-index:10;
display:flex;
flex-direction:column;
}

.cart.active{right:0;}

.cart-item{
background:#111827;
padding:10px;
border-radius:10px;
margin-bottom:10px;
}

/* CONTROLES */
.controls{
display:flex;
justify-content:space-between;
margin-top:5px;
}

.controls button{
width:30px;
height:30px;
padding:0;
}

/* TOTAL */
.total{
margin-top:10px;
font-size:18px;
}
</style>
</head>

<body>

<!-- INTRO -->
<div class="intro">
    <div class="logo-intro">🛒 MOD MUSIC</div>
</div>

<header>
<h2>🎧 MOD MUSIC</h2>
<div class="cart-btn" onclick="toggleCart()">🛒 <span id="count">0</span></div>
</header>

<section class="products" id="products"></section>

<div class="overlay" id="overlay" onclick="toggleCart()"></div>

<div class="cart" id="cart">
<h2>Carrito</h2>
<div id="cartItems"></div>
<div class="total" id="total">Total: $0</div>
</div>

<script>
const products = [
{ name:"Guitarra", price:500, img:"https://images.unsplash.com/photo-1510915228340-29c85a43dcfe" },
{ name:"Piano", price:900, img:"https://images.unsplash.com/photo-1513885535751-8b9238bd345a" },
{ name:"Batería", price:700, img:"https://images.unsplash.com/photo-1511379938547-c1f69419868d" },
{ name:"Violín", price:400, img:"https://images.unsplash.com/photo-1520523839897-bd0b52f945a0" },
{ name:"Saxofón", price:650, img:"https://images.unsplash.com/photo-1507838153414-b4b713384a76" },
{ name:"Bajo", price:550, img:"https://images.unsplash.com/photo-1507874457470-272b3c8d8ee2" }
];

let cart = [];

const container = document.getElementById("products");

/* 🔥 CARGAR PRODUCTOS DINAMICOS */
products.forEach((p,i)=>{
    container.innerHTML += `
    <div class="card">
        <img src="${p.img}">
        <h3>${p.name}</h3>
        <p>$${p.price}</p>
        <button onclick="add(${i})">Agregar</button>
    </div>`;
});

function toggleCart(){
    cartBox.classList.toggle("active");
    overlay.classList.toggle("active");
}

const cartBox = document.getElementById("cart");
const overlay = document.getElementById("overlay");

/* 🛒 AGREGAR */
function add(i){
    let item = cart.find(p=>p.name===products[i].name);
    if(item){
        item.qty++;
    }else{
        cart.push({...products[i], qty:1});
    }
    updateCart();
    toggleCart();
}

/* 🔄 ACTUALIZAR */
function updateCart(){
    const items = document.getElementById("cartItems");
    items.innerHTML="";
    let total=0;
    let count=0;

    cart.forEach((p,index)=>{
        total += p.price*p.qty;
        count += p.qty;

        items.innerHTML += `
        <div class="cart-item">
            ${p.name} - $${p.price} x ${p.qty}
            <div class="controls">
                <button onclick="change(${index},-1)">-</button>
                <button onclick="change(${index},1)">+</button>
                <button onclick="removeItem(${index})">x</button>
            </div>
        </div>`;
    });

    document.getElementById("total").innerText="Total: $"+total;
    document.getElementById("count").innerText=count;
}

/* ➕➖ */
function change(i,val){
    cart[i].qty += val;
    if(cart[i].qty<=0) cart.splice(i,1);
    updateCart();
}

/* ❌ */
function removeItem(i){
    cart.splice(i,1);
    updateCart();
}
</script>

</body>
<div class="modal" id="modal">
    <span onclick="closeModal()">❌</span>
    <img id="modalImg">
    <div>
        <button onclick="prev()">⬅️</button>
        <button onclick="next()">➡️</button>
    </div>
</div>
</html>
